<!DOCTYPE html> <!-- Tells the browser to use the modern HTML5 standard -->
<html lang="en"> <!-- Starts the HTML document and sets the language to English -->
<head> <!-- Head section contains page metadata and settings -->
  <meta charset="UTF-8"> <!-- Sets the character encoding so text displays correctly -->
  <title>Mario Style Game Setup</title> <!-- Sets the text that appears in the browser tab -->
  <style> /* Starts a block of CSS styles that control how the page looks */
    body { /* Styles applied to the entire page body */
      margin: 0; /* Removes default outer spacing around the page */
      background-color: #000000; /* Sets the whole page background to black */
      display: flex; /* Uses flexbox layout to help center the content */
      justify-content: center; /* Horizontally centers the content inside the page */
      align-items: center; /* Vertically centers the content inside the page */
      min-height: 100vh; /* Makes the body at least as tall as the visible window */
    } /* Ends the body style block */

    #gameCanvas { /* Styles specifically for the canvas with id "gameCanvas" */
      width: 800px; /* Sets the canvas display width on the page to 800 pixels */
      height: 400px; /* Sets the canvas display height on the page to 400 pixels */
      background-color: #000000; /* Gives the canvas itself a black background */
      border: 2px solid #ffffff; /* Adds a white border around the canvas so it is easy to see */
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); /* Adds a soft glow around the canvas for visibility */
    } /* Ends the gameCanvas style block */
  </style> <!-- Ends the CSS styles section -->
</head> <!-- Ends the head section -->
<body> <!-- Starts the visible content of the page -->
  <!-- Canvas where the game will be drawn -->
  <canvas
    id="gameCanvas"
    width="800"
    height="400"
  ></canvas> <!-- Visible black rectangle with a white border in the center -->

  <!-- Hidden image element used to load the sprite sheet file -->
  <!-- IMPORTANT: Put `mario.jpeg` in the SAME folder as this `index.html` file -->
  <img id="marioSprite" src="mario.jpeg" alt="Mario sprite sheet" style="display: none;">

  <script>
    // JavaScript below controls the game logic and drawing on the canvas
    // Get a reference to the canvas element in the HTML
    const canvas = document.getElementById('gameCanvas');
    // Ask the canvas for a 2D drawing context so we can draw shapes
    const ctx = canvas.getContext('2d');

    // Level definitions: each level has its own platforms, enemies, and coins
    // Positions are absolute pixel values inside the 800x400 canvas
    const levels = [
      {
        // Level 1: simple introduction
        platforms: [
          { x: 0,   y: 350, width: 800, height: 50 }, // ground
          { x: 200, y: 250, width: 150, height: 20 }, // mid platform
          { x: 450, y: 180, width: 120, height: 20 }  // higher platform
        ],
        enemies: [
          { x: 150, y: 310, width: 40, height: 40, speedX: 2 },   // patrol on ground
          { x: 500, y: 310, width: 40, height: 40, speedX: -2 }   // patrol on ground
        ],
        coins: [
          { x: 250, y: 220, width: 20, height: 20, active: true }, // above first mid platform
          { x: 500, y: 150, width: 20, height: 20, active: true }  // above higher platform
        ]
      },
      {
        // Level 2: more platforms and coins
        platforms: [
          { x: 0,   y: 350, width: 800, height: 50 }, // ground
          { x: 120, y: 280, width: 160, height: 20 },
          { x: 360, y: 230, width: 160, height: 20 },
          { x: 580, y: 180, width: 140, height: 20 }
        ],
        enemies: [
          { x: 100, y: 310, width: 40, height: 40, speedX: 2 },    // ground enemy
          { x: 420, y: 190, width: 40, height: 40, speedX: -2 }    // patrols under upper platforms
        ],
        coins: [
          { x: 150, y: 250, width: 20, height: 20, active: true },
          { x: 200, y: 250, width: 20, height: 20, active: true },
          { x: 400, y: 200, width: 20, height: 20, active: true },
          { x: 600, y: 150, width: 20, height: 20, active: true }
        ]
      },
      {
        // Level 3: denser platforms, more enemies and coins
        platforms: [
          { x: 0,   y: 350, width: 800, height: 50 }, // ground
          { x: 80,  y: 290, width: 140, height: 20 },
          { x: 300, y: 240, width: 160, height: 20 },
          { x: 540, y: 200, width: 160, height: 20 },
          { x: 220, y: 170, width: 120, height: 20 }
        ],
        enemies: [
          { x: 80,  y: 310, width: 40, height: 40, speedX: 2 },    // ground enemy 1
          { x: 500, y: 310, width: 40, height: 40, speedX: -2 },   // ground enemy 2
          { x: 320, y: 200, width: 40, height: 40, speedX: 1.5 }   // mid-level enemy
        ],
        coins: [
          { x: 110, y: 260, width: 20, height: 20, active: true },
          { x: 340, y: 210, width: 20, height: 20, active: true },
          { x: 580, y: 170, width: 20, height: 20, active: true },
          { x: 260, y: 140, width: 20, height: 20, active: true },
          { x: 700, y: 310, width: 20, height: 20, active: true }
        ]
      }
    ];

    // These arrays will hold the platforms, enemies, and coins for the current level
    let platforms = [];
    let enemies = [];
    let coins = [];

    // Track the player's score
    let score = 0;
    // Track which level we are currently on (index into the levels array)
    let currentLevelIndex = 0;
    // Track which screen/state the game is in: 'start', 'playing', or 'gameover'
    let gameState = 'start';

    // Track the player's animation state: 'idle', 'run', or 'jump'
    let playerState = 'idle';
    // Track which direction the player is facing: 'right' or 'left'
    let playerFacing = 'right';
    // Control running animation frame changes
    let runFrameIndex = 0; // Which running frame we are on (0 or 1)
    let runFrameCounter = 0; // Counts frames to slow down animation changes
    const RUN_FRAME_DELAY = 8; // Higher value = slower footstep animation

    // Load the player sprite sheet image from the hidden <img> tag in the HTML
    const playerSprite = document.getElementById('marioSprite');
    let spriteLoaded = false; // Becomes true once the image has fully loaded
    let spriteError = false; // Becomes true if the image fails to load (wrong name/path)

    // When the image finishes loading, set the flag so we know it is safe to draw
    // and compute the size of each animation frame from the full image size.
    playerSprite.onload = () => {
      spriteLoaded = true;
      // Assume the sprite sheet has 4 frames laid out in one horizontal row:
      // [idle][run1][run2][jump]
      SPRITE_FRAME_WIDTH = playerSprite.naturalWidth / 4;
      SPRITE_FRAME_HEIGHT = playerSprite.naturalHeight;
    };

    // If the image fails to load, set a flag so we can show a helpful message
    playerSprite.onerror = () => {
      spriteError = true;
    };

    // If the image is already cached/loaded, mark it as loaded immediately
    if (playerSprite.complete && playerSprite.naturalWidth > 0) {
      spriteLoaded = true;
      // Also compute frame sizes right away
      SPRITE_FRAME_WIDTH = playerSprite.naturalWidth / 4;
      SPRITE_FRAME_HEIGHT = playerSprite.naturalHeight;
    }

    // Describe how big each frame is inside the sprite sheet (in source pixels).
    // These will be filled in once the image loads, based on its actual size.
    // We assume the sheet has 4 frames in a single horizontal row:
    // 0: idle, 1-2: running, 3: jump.
    let SPRITE_FRAME_WIDTH = 0;
    let SPRITE_FRAME_HEIGHT = 0;

    // Helper function for axis-aligned rectangle collision (AABB)
    // Returns true if rectangles a and b overlap
    function isColliding(a, b) {
      return (
        a.x < b.x + b.width && // a's left is left of b's right
        a.x + a.width > b.x && // a's right is right of b's left
        a.y < b.y + b.height && // a's top is above b's bottom
        a.y + a.height > b.y // a's bottom is below b's top
      );
    }

    // Load all platforms, enemies, and coins for the given level index
    function loadLevel(levelIndex) {
      const level = levels[levelIndex];

      // Create fresh copies so we can modify positions (like enemy movement) without
      // changing the original level definition data
      platforms = level.platforms.map((p) => ({ ...p }));
      enemies = level.enemies.map((e) => ({ ...e }));
      coins = level.coins.map((c) => ({ ...c }));

      // Place the player so their feet rest on top of the ground platform (first platform)
      player.x = 20;
      player.y = platforms[0].y - player.height;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
    }

    // Reset all moving/interactive parts of the game back to their starting values
    function resetGame() {
      // Go back to the first level
      currentLevelIndex = 0;

      // Reset the score back to zero
      score = 0;

      // Reset animation state
      playerState = 'idle';
      playerFacing = 'right';
      runFrameIndex = 0;
      runFrameCounter = 0;

      // Reload level 0 data (platforms, enemies, coins, player position)
      loadLevel(currentLevelIndex);
    }

    // Define a player object to hold all information about the character
    const player = {
      width: 40, // Player is 40 pixels wide
      height: 50, // Player is 50 pixels tall
      x: 20, // Start near the left side of the canvas (20 pixels from the left edge)
      y: 0, // Temporary value; will be set correctly by loadLevel()
      vx: 0, // Horizontal velocity starts at 0 (not moving left or right)
      vy: 0, // Vertical velocity starts at 0 (not moving up or down)
      speed: 5, // Horizontal speed in pixels per frame when a key is pressed
      onGround: false // Tracks whether the player is currently standing on the ground
    };

    // Gravity strength: how much downward speed is added each frame
    const gravity = 0.8;

    // Object to track which movement keys are currently pressed
    const keys = {
      ArrowLeft: false, // True when the left arrow key is held down
      ArrowRight: false, // True when the right arrow key is held down
      Space: false // True when the spacebar is pressed (used for jumping)
    };

    // Listen for when a key is pressed down
    window.addEventListener('keydown', (event) => {
      if (event.code === 'ArrowLeft') {
        keys.ArrowLeft = true; // Remember that the left arrow key is now held down
      } else if (event.code === 'ArrowRight') {
        keys.ArrowRight = true; // Remember that the right arrow key is now held down
      } else if (event.code === 'Space') {
        keys.Space = true; // Remember that the spacebar was pressed

        // Jumping logic: only allow a jump if the player is on the ground
        // and only while the game is in the 'playing' state
        if (gameState === 'playing' && player.onGround) {
          // Give the player an instant upward velocity (negative moves up)
          player.vy = -15;
          // Mark the player as no longer on the ground so they cannot double jump
          player.onGround = false;
        }

        // Prevent the page from scrolling when spacebar is pressed
        event.preventDefault();
      } else if (event.code === 'Enter') {
        // Start the game when Enter is pressed on the start screen
        if (gameState === 'start') {
          // Make sure the first level is loaded before playing
          loadLevel(currentLevelIndex);
          gameState = 'playing';
        }
      } else if (event.code === 'KeyR') {
        // Restart the game when 'R' is pressed on the game over screen
        if (gameState === 'gameover') {
          resetGame(); // Put everything back to starting values
          gameState = 'start'; // Go back to the start screen
        }
      }
    });

    // Listen for when a key is released
    window.addEventListener('keyup', (event) => {
      if (event.code === 'ArrowLeft') {
        keys.ArrowLeft = false; // Left arrow is no longer pressed
      } else if (event.code === 'ArrowRight') {
        keys.ArrowRight = false; // Right arrow is no longer pressed
      } else if (event.code === 'Space') {
        keys.Space = false; // Spacebar is no longer pressed
      }
    });

    // Update function: handles movement and physics calculations each frame
    function update() {
      // Only update movement and physics while the game is actively being played
      if (gameState !== 'playing') {
        return;
      }

      // At the start of each frame, assume the player is in the air
      // If we detect a platform under them, we will set this back to true
      player.onGround = false;

      // --- Horizontal movement logic ---
      // If only the left arrow is pressed, move left
      if (keys.ArrowLeft && !keys.ArrowRight) {
        player.vx = -player.speed; // Negative velocity moves the player left
      // If only the right arrow is pressed, move right
      } else if (keys.ArrowRight && !keys.ArrowLeft) {
        player.vx = player.speed; // Positive velocity moves the player right
      } else {
        // If neither or both keys are pressed, stop horizontal movement
        player.vx = 0;
      }

      // Apply horizontal velocity to the player's x-position
      player.x += player.vx;

      // Keep the player inside the left boundary of the canvas
      if (player.x < 0) {
        player.x = 0;
      }

      // Keep the player inside the right boundary of the canvas
      if (player.x + player.width > canvas.width) {
        player.x = canvas.width - player.width;
      }

      // --- Gravity and vertical movement logic ---

      // Store the player's previous vertical position before applying gravity
      // We use this to detect whether the player has crossed a platform edge this frame
      const previousY = player.y;
      const previousBottom = previousY + player.height; // Position of the player's feet last frame

      // Gravity: increase the vertical velocity by a small amount each frame
      // This simulates acceleration downward over time
      player.vy += gravity;

      // Apply vertical velocity to the player's y-position
      // Positive vy moves the player down; negative vy moves the player up
      player.y += player.vy;

      // --- Platform collision logic using AABB (Axis-Aligned Bounding Box) ---
      // We only care about collisions when the player is moving downward (falling)
      if (player.vy >= 0) {
        // Loop through every platform to see if the player is landing on top of it
        for (let i = 0; i < platforms.length; i++) {
          const platform = platforms[i]; // Current platform we are checking

          // First check horizontal overlap:
          // The player's right side must be to the right of the platform's left,
          // AND the player's left side must be to the left of the platform's right.
          const horizontallyOverlapping =
            player.x < platform.x + platform.width &&
            player.x + player.width > platform.x;

          if (!horizontallyOverlapping) {
            // If there is no horizontal overlap, this platform cannot be under the player
            continue; // Skip to the next platform
          }

          // Compute where the player's feet are after movement this frame
          const currentBottom = player.y + player.height;
          // The top edge of the platform (where the player should stand)
          const platformTop = platform.y;

          // Now check vertical overlap in a way that detects *landing from above*:
          // - In the previous frame, the player's feet were at or above the platform top.
          // - In the current frame, the player's feet have moved to or below the platform top.
          // This means the player has crossed the platform surface while falling.
          const wasAbovePlatform = previousBottom <= platformTop;
          const isNowOnOrBelowTop = currentBottom >= platformTop;

          if (wasAbovePlatform && isNowOnOrBelowTop) {
            // Collision resolution: snap the player onto the top of the platform.
            // We set the player's y so that their feet sit exactly on the platform surface.
            player.y = platformTop - player.height;

            // Reset vertical velocity so the player stops falling.
            // Without this, gravity would keep pulling them downward through the platform.
            player.vy = 0;

            // Mark the player as on the ground so they can jump again.
            player.onGround = true;

            // Since we have corrected the position using this platform,
            // we can stop checking further platforms for this frame.
            break;
          }
        }
      }

      // --- Enemy movement and game-over detection ---
      for (let i = 0; i < enemies.length; i++) {
        const enemy = enemies[i];

        // Move the enemy horizontally according to its speed
        enemy.x += enemy.speedX;

        // If the enemy reaches the left or right edge of the canvas,
        // flip its direction by reversing the horizontal speed.
        if (enemy.x <= 0 || enemy.x + enemy.width >= canvas.width) {
          enemy.speedX *= -1;
        }

        // Check for collision between the player and this enemy
        if (isColliding(player, enemy)) {
          // Trigger game over: player touched an enemy
          gameState = 'gameover';
        }
      }

      // --- Coin collection and score updates ---
      for (let i = 0; i < coins.length; i++) {
        const coin = coins[i];

        // Skip coins that have already been collected (inactive)
        if (!coin.active) continue;

        // If the player's rectangle overlaps the coin rectangle,
        // deactivate the coin and increase the score.
        if (isColliding(player, coin)) {
          coin.active = false;
          score += 10;
        }
      }

      // After processing all coins, check if the player has collected every coin
      let allCoinsCollected = true;
      for (let i = 0; i < coins.length; i++) {
        if (coins[i].active) {
          allCoinsCollected = false;
          break;
        }
      }

      // If all coins in this level are collected, move to the next level (if any)
      if (allCoinsCollected) {
        if (currentLevelIndex < levels.length - 1) {
          // Advance to the next level and reload its layout
          currentLevelIndex++;
          loadLevel(currentLevelIndex);
        } else {
          // If there are no more levels, treat this as a win and go to the game over screen
          gameState = 'gameover';
        }
      }

      // --- Update animation state based on movement and whether the player is in the air ---
      // Update which way the player is facing based on horizontal velocity
      if (player.vx > 0) {
        playerFacing = 'right';
      } else if (player.vx < 0) {
        playerFacing = 'left';
      }

      // Decide if the player is idle, running, or jumping
      if (!player.onGround) {
        // If not standing on any platform, they are in the air (jumping or falling)
        playerState = 'jump';
      } else if (player.vx !== 0) {
        // On the ground and moving horizontally
        playerState = 'run';
      } else {
        // On the ground and not moving
        playerState = 'idle';
      }

      // Handle running animation frame cycling
      if (playerState === 'run') {
        runFrameCounter++;
        // After enough frames have passed, advance to the next running frame
        if (runFrameCounter >= RUN_FRAME_DELAY) {
          runFrameCounter = 0;
          // Toggle between 0 and 1 to alternate two running frames
          runFrameIndex = (runFrameIndex + 1) % 2;
        }
      } else {
        // When not running, reset running animation so next run starts from the first frame
        runFrameIndex = 0;
        runFrameCounter = 0;
      }
    }

    // Draw the player using the sprite sheet instead of a simple rectangle
    function drawPlayer() {
      // If the sprite image has not finished loading yet, fall back to drawing a red rectangle
      if (!spriteLoaded) {
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // If the sprite failed to load, draw a message explaining what to fix
        if (spriteError) {
          ctx.fillStyle = 'white';
          ctx.font = '16px Arial';
          ctx.textBaseline = 'top';
          ctx.fillText("Sprite not found. Put 'mario.jpeg' next to index.html (or fix the filename).", 10, 10);
        }

        return;
      }

      // Choose which column/frame from the sprite sheet to use
      let frameCol = 0;

      if (playerState === 'idle') {
        // Idle frame at column 0
        frameCol = 0;
      } else if (playerState === 'run') {
        // Running frames at columns 1 and 2
        frameCol = 1 + runFrameIndex; // 1 or 2
      } else if (playerState === 'jump') {
        // Jumping frame at column 3
        frameCol = 3;
      }

      // We assume all frames are on the first row (row index 0)
      const frameRow = 0;

      // Source rectangle inside the sprite sheet image
      const sx = frameCol * SPRITE_FRAME_WIDTH;
      const sy = frameRow * SPRITE_FRAME_HEIGHT;
      const sw = SPRITE_FRAME_WIDTH;
      const sh = SPRITE_FRAME_HEIGHT;

      // Destination rectangle on the canvas:
      // We scale the sprite to match the logical player width/height so
      // collision and drawing stay in sync.
      const dx = player.x;
      const dy = player.y;
      const dw = player.width;
      const dh = player.height;

      if (playerFacing === 'right') {
        // Facing right: draw normally
        ctx.drawImage(playerSprite, sx, sy, sw, sh, dx, dy, dw, dh);
      } else {
        // Facing left: flip the sprite horizontally around the player's rectangle
        ctx.save();
        // Move the origin to the right edge of the player, then flip horizontally
        ctx.translate(dx + dw, dy);
        ctx.scale(-1, 1);
        // Draw as if facing right, but because we flipped the canvas,
        // it will appear mirrored
        ctx.drawImage(playerSprite, sx, sy, sw, sh, 0, 0, dw, dh);
        ctx.restore();
      }
    }

    // Draw function: clears the screen and redraws everything each frame
    function draw() {
      // Clear the entire canvas so we can draw a fresh frame
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw each platform in the platforms array
      ctx.fillStyle = '#228B22'; // Set fill color to a grass-like green for all platforms
      for (let i = 0; i < platforms.length; i++) {
        const platform = platforms[i]; // Get the current platform
        // Draw the platform as a filled rectangle
        ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
      }

       // Draw all coins that are still active (not collected yet)
      ctx.fillStyle = '#FFFF00'; // Yellow color for coins
      for (let i = 0; i < coins.length; i++) {
        const coin = coins[i];
        if (!coin.active) continue; // Skip drawing collected coins
        ctx.fillRect(coin.x, coin.y, coin.width, coin.height);
      }

      // Draw all enemies as orange rectangles
      ctx.fillStyle = '#FFA500'; // Orange color for enemies
      for (let i = 0; i < enemies.length; i++) {
        const enemy = enemies[i];
        ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
      }

      // Draw the player sprite (or a red rectangle fallback if the image is not loaded yet)
      drawPlayer();

      // For the 'playing' and 'gameover' states, show the score in the top-left corner
      if (gameState === 'playing' || gameState === 'gameover') {
        ctx.fillStyle = 'white'; // White text color
        ctx.font = '24px Arial'; // Font size and family for the score text
        ctx.textBaseline = 'top'; // Align text from the top
        ctx.fillText('Score: ' + score, 20, 30); // Draw score at (20, 30)
      }

      // Overlay different text depending on the current game state
      if (gameState === 'start') {
        // Start screen: show title and instructions
        ctx.fillStyle = 'white';
        ctx.font = '36px Arial';
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';
        ctx.fillText('Platform Runner', canvas.width / 2, canvas.height / 2 - 30);

        ctx.font = '24px Arial';
        ctx.fillText('Press Enter to Start', canvas.width / 2, canvas.height / 2 + 20);

        // Reset alignment so other text drawing (if added later) is predictable
        ctx.textAlign = 'start';
        ctx.textBaseline = 'top';
      } else if (gameState === 'gameover') {
        // Game over screen: show game over text, final score, and restart instructions
        ctx.fillStyle = 'white';
        ctx.font = '40px Arial';
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 30);

        ctx.font = '24px Arial';
        ctx.fillText('Final Score: ' + score, canvas.width / 2, canvas.height / 2 + 10);
        ctx.fillText('Press R to Restart', canvas.width / 2, canvas.height / 2 + 40);

        // Reset alignment for future drawing
        ctx.textAlign = 'start';
        ctx.textBaseline = 'top';
      }
    }

    // Game loop function: runs once for every animation frame
    function gameLoop() {
      update(); // First, update the game state (movement and physics)
      draw(); // Then, draw the updated state to the canvas
      // Ask the browser to call gameLoop again before the next screen repaint
      requestAnimationFrame(gameLoop);
    }

    // Start the game loop for the first time to begin the animation
    gameLoop();
  </script> <!-- Ends the JavaScript block -->
</body> <!-- Ends the visible content of the page -->
</html> <!-- Ends the entire HTML document -->
